<svg width="880" height="220" viewBox="0 0 880 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sketchstack">
  <defs>
    <linearGradient id="ssl-tile" x1="20" y1="20" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ssl-word" x1="232" y1="80" x2="740" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4285f4"/>
      <stop offset="0.55" stop-color="#f5a623"/>
      <stop offset="1" stop-color="#d96570"/>
    </linearGradient>
  </defs>

  <!-- icon -->
  <g transform="translate(20,20) scale(0.3515625)">
    <rect width="512" height="512" rx="116" fill="url(#ssl-tile)"/>
    <g stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.35" fill="none">
      <path d="M168 168 L344 256"/>
      <path d="M344 256 L168 344"/>
    </g>
    <rect x="112" y="120" width="112" height="96" rx="26" fill="#4285f4"/>
    <rect x="288" y="208" width="112" height="96" rx="26" fill="#f5a623"/>
    <rect x="112" y="296" width="112" height="96" rx="26" fill="#d96570"/>
    <g fill="#ffffff">
      <circle cx="168" cy="168" r="15"/>
      <circle cx="344" cy="256" r="15"/>
      <circle cx="168" cy="344" r="15"/>
    </g>
  </g>

  <!-- wordmark: Sketch (mono) + stack (Gemini gradient) -->
  <text x="232" y="140" font-family="Geist, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="700" letter-spacing="-2">
    <tspan fill="#0f172a">Sketch</tspan><tspan fill="url(#ssl-word)">stack</tspan>
  </text>
</svg>
